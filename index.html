<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Jon &amp; Viv: We Ball · 3 October 2026</title>
  <meta name="description" content="Jon &amp; Viv are getting married — Saturday 3 October 2026 in Bandar Puteri Puchong." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Chewy&family=Patrick+Hand&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cpath d='M16 26C12 22 6 18 6 12C6 9 8.5 7 11.5 7C13.5 7 15 8 16 9.5C17 8 18.5 7 20.5 7C23.5 7 26 9 26 12C26 18 20 22 16 26Z' fill='%23224da5'/%3E%3C/svg%3E" />
</head>
<body>

  <nav class="site-nav fade-in" style="--delay: 100ms">
    <a href="index.html" class="nav-brand">Jon &amp; Viv</a>
    <span class="handwritten" style="color: var(--blue); font-size: 1.125rem;">03.10.2026</span>
  </nav>

  <section class="hero">

    <!-- Decorative SVG corners — outer div handles pop-in entrance,
         inner div handles continuous spin/sway so they don't fight. -->

    <div class="hero-doodle hero-doodle-tl pop-in" style="--delay: 600ms; --rot: -8deg;">
      <div class="anim-spin"><img src="img/flower.svg" alt="" /></div>
    </div>

    <div class="hero-doodle hero-doodle-tr pop-in" style="--delay: 800ms; --rot: 12deg;">
      <div class="anim-scribble-bob"><img src="img/scribble-1.svg" alt="" /></div>
    </div>

    <div class="hero-doodle hero-doodle-bl pop-in" style="--delay: 1000ms; --rot: 6deg;">
      <div class="anim-sway"><img src="img/bouquet.svg" alt="" /></div>
    </div>

    <div class="hero-doodle hero-doodle-br pop-in" style="--delay: 1100ms; --rot: -6deg;">
      <div class="anim-sway anim-sway-reverse"><img src="img/bouquet.svg" alt="" style="transform: scaleX(-1);" /></div>
    </div>

    <!-- Extra scattered accents in the mid-margins (desktop only) -->
    <div class="hero-doodle pop-in hide-on-mobile" style="top: 38%; left: 4%; width: 50px; --delay: 1300ms; --rot: 20deg;">
      <img src="img/scribble-2.svg" alt="" />
    </div>
    <div class="hero-doodle pop-in hide-on-mobile" style="top: 42%; right: 6%; width: 60px; --delay: 1400ms; --rot: -25deg;">
      <img src="img/flower.svg" alt="" />
    </div>
    <div class="hero-doodle pop-in hide-on-mobile" style="bottom: 38%; left: 6%; width: 56px; --delay: 1500ms; --rot: -15deg;">
      <img src="img/drink.svg" alt="" />
    </div>
    <div class="hero-doodle pop-in hide-on-mobile" style="bottom: 35%; right: 4%; width: 70px; --delay: 1600ms; --rot: 12deg;">
      <img src="img/beef.svg" alt="" />
    </div>

    <div style="position: relative; z-index: 2; max-width: 720px; width: 100%;">

      <!-- Date + time pills -->
      <div class="hero-pills">
        <span class="pill hero-pill-left pop-in" style="--delay: 200ms; --rot: -3deg;">03.10.2026</span>
        <span class="pill hero-pill-right pop-in" style="--delay: 350ms; --rot: 3deg;">Saturday 4pm</span>
      </div>

      <!-- Bride + groom illustration — your full invite card centrepiece.
           Layers: outer fade-in (entrance) > wiggle (hover effect) > couple-float
           (continuous gentle float). Each animation lives on its own element so
           they don't override each other. -->
      <div class="hero-couple-illo fade-in" style="--delay: 500ms;">
        <div class="wiggle">
          <div class="couple-float">
            <img src="img/bride-groom.svg" alt="You're invited to our wedding — Jon and Viv" />
          </div>
        </div>
      </div>

      <!-- Jon & Viv name labels — using your chunky brush SVGs.
           A tiny scribble sits between them for the "&" moment. -->
      <div class="hero-names">
        <img src="img/jon.svg" alt="Jon"
             class="fade-in"
             style="--delay: 900ms; transform: rotate(-3deg); width: clamp(80px, 14vw, 130px); height: auto;" />
        <img src="img/scribble-2.svg" alt=""
             class="fade-in"
             style="--delay: 1000ms; width: clamp(36px, 6vw, 56px); height: auto;" />
        <img src="img/viv.svg" alt="Viv"
             class="fade-in"
             style="--delay: 1100ms; transform: rotate(3deg); width: clamp(70px, 12vw, 110px); height: auto;" />
      </div>

      <!-- CTA -->
      <div class="hero-cta fade-in" style="--delay: 1300ms;">
        <div class="btn-row">
          <a href="rsvp.html" class="btn">RSVP</a>
          <a href="details.html" class="btn btn-outline">Details</a>
        </div>
      </div>

    </div>
  </section>

  <footer class="site-footer">
    With love · Jon &amp; Viv
  </footer>

  <script src="js/main.js"></script>
</body>
</html>
