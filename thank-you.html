<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>You're In · Jon &amp; Viv: We Ball</title>
  <meta name="description" content="Thank you for your RSVP." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Chewy&family=Patrick+Hand&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cpath d='M16 26C12 22 6 18 6 12C6 9 8.5 7 11.5 7C13.5 7 15 8 16 9.5C17 8 18.5 7 20.5 7C23.5 7 26 9 26 12C26 18 20 22 16 26Z' fill='%23224da5'/%3E%3C/svg%3E" />
</head>
<body>

  <!-- Decorative scatter -->
  <div class="page-doodles" aria-hidden="true">
    <div class="page-doodle" style="top: 8%; left: 5%; width: 70px;">
      <div class="anim-spin"><img src="img/flower.svg" alt="" /></div>
    </div>
    <div class="page-doodle" style="top: 10%; right: 5%; width: 80px; transform: rotate(15deg);">
      <img src="img/scribble-1.svg" alt="" />
    </div>
    <div class="page-doodle hide-on-mobile" style="top: 30%; left: 3%; width: 110px;">
      <div class="anim-sway"><img src="img/bouquet.svg" alt="" /></div>
    </div>
    <div class="page-doodle hide-on-mobile" style="top: 30%; right: 3%; width: 110px;">
      <div class="anim-sway anim-sway-reverse"><img src="img/bouquet.svg" alt="" style="transform: scaleX(-1);" /></div>
    </div>
    <div class="page-doodle hide-on-mobile" style="bottom: 18%; left: 8%; width: 60px; transform: rotate(-20deg);">
      <img src="img/drink.svg" alt="" />
    </div>
    <div class="page-doodle hide-on-mobile" style="bottom: 18%; right: 8%; width: 70px; transform: rotate(15deg);">
      <img src="img/beef.svg" alt="" />
    </div>
    <div class="page-doodle hide-on-mobile" style="top: 55%; left: 7%; width: 50px; transform: rotate(35deg);">
      <img src="img/scribble-2.svg" alt="" />
    </div>
    <div class="page-doodle hide-on-mobile" style="top: 50%; right: 8%; width: 70px;">
      <div class="anim-spin"><img src="img/flower.svg" alt="" /></div>
    </div>
  </div>

  <section class="thanks">

    <!-- Confetti burst -->
    <div class="confetti" data-confetti aria-hidden="true"></div>

    <div class="thanks-inner">

      <!-- Goose king celebrates your RSVP -->
      <div class="fade-in wiggle" style="--delay: 200ms; max-width: 180px; margin: 0 auto var(--space-4);">
        <img src="img/goose-king.png" alt="" style="width: 100%; height: auto; display: block;" />
      </div>

      <p class="eyebrow fade-in" style="--delay: 400ms">Your RSVP is locked in</p>
      <h1 class="fade-in" style="--delay: 600ms">You're in.</h1>

      <p class="fade-in" style="--delay: 900ms; margin-top: var(--space-3);">
        See you on the third of October. It's gonna be a movie.
      </p>

      <p class="fade-in" style="--delay: 1100ms; margin-top: var(--space-4); font-family: var(--font-accent); color: var(--ink-soft); font-size: 1rem;">
        If anything changes, just submit a new RSVP — we'll take the latest.
      </p>

      <div class="btn-row fade-in" style="--delay: 1300ms;">
        <a href="details.html" class="btn">See Details</a>
        <a href="index.html" class="btn btn-outline">Back to Home</a>
      </div>

    </div>
  </section>

  <footer class="site-footer">
    With love · Jon &amp; Viv
  </footer>

  <script src="js/main.js"></script>
</body>
</html>
